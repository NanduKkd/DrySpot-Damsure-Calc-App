name: app_client
description: Flutter client app for the orchestrator template.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.1
  provider: ^6.1.2
  uuid: ^4.3.3
  sqflite: ^2.3.2
  path: ^1.9.0
  shared_preferences: ^2.2.2
  pdf: ^3.10.8
  path_provider: ^2.1.2
  image_picker: ^1.1.2
  geolocator: ^11.0.0
  url_launcher: ^6.3.2
  share_plus: ^9.0.0
  printing: ^5.13.1
  open_filex: ^4.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  sqflite_common_ffi: ^2.3.2+1
  path_provider_platform_interface: ^2.1.2
  plugin_platform_interface: ^2.1.8
  mockito: ^5.4.4
  build_runner: ^2.4.8

flutter:
  uses-material-design: true

  assets:
    - assets/pdf-images/
